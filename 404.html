<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 | 상상컴퍼니</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--off-white);
            padding: 20px;
        }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            color: var(--primary-color);
            margin-bottom: 1rem;
            opacity: 0.1;
        }
        .error-message {
            margin-bottom: 2rem;
        }
        .error-message h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .error-message p {
            color: var(--light-text);
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">
            <h1>상상이 멈춘 곳입니다.</h1>
            <p>요청하신 페이지가 존재하지 않거나 이동되었습니다. <br>상상컴퍼니의 새로운 디자인 세계로 돌아가보세요.</p>
        </div>
        <a href="/" class="btn btn-primary">홈으로 돌아가기</a>
    </div>
</body>
</html>
